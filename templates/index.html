<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App - Grid View</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>My Missions</h1>

    <form id="add-form">
      <div class="form-row">
        <input type="text" id="new-title" placeholder="Mission Name..." required autocomplete="off" />
        <select id="new-priority">
          <option value="1" selected>🌱 Low</option>
          <option value="2">⚡ Medium</option>
          <option value="3">🔥 High</option>
        </select>
      </div>
      <input type="text" id="new-body" placeholder="Description (Optional)..." autocomplete="off" />
      <button type="submit">Add Mission</button>
    </form>

    <ul id="task-list"></ul>
    <p id="empty-msg" class="empty-msg hidden">No missions yet.</p>
  </div>

  <script>
    const API = "/tasks";
    const addForm = document.getElementById("add-form");

    function renderTasks(tasks) {
      const taskList = document.getElementById("task-list");
      
      // מיון: קודם אלו שלא הושלמו, ואז לפי דחיפות גבוהה לנמוכה
      tasks.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return b.priority - a.priority;
      });

      taskList.innerHTML = "";
      document.getElementById("empty-msg").classList.toggle("hidden", tasks.length > 0);

      tasks.forEach((task, index) => {
        const li = document.createElement("li");
        li.className = "task-item" + (task.completed ? " completed" : "");
        
        const prioLabels = { 1: "LOW", 2: "MED", 3: "HIGH" };

        li.innerHTML = `
          <div class="task-number">#${index + 1}</div>
          <label class="checkbox-label">
            <input type="checkbox" class="toggle-cb" ${task.completed ? "checked" : ""} />
            <div class="task-content">
              <div class="title-container">
                <span class="title-text">${escapeHtml(task.title)}</span>
                <span class="prio-tag prio-${task.priority || 1}">${prioLabels[task.priority] || "LOW"}</span>
              </div>
              <div class="body-text">${escapeHtml(task.body || "")}</div>
            </div>
          </label>
          <div class="actions">
            <button class="btn-edit" title="Edit">&#9998;</button>
            <button class="btn-delete" title="Delete">&#10005;</button>
          </div>
        `;

        li.querySelector(".toggle-cb").onchange = () => toggleTask(task._id, !task.completed);
        li.querySelector(".btn-delete").onclick = () => deleteTask(task._id);
        li.querySelector(".btn-edit").onclick = () => startInlineEdit(li, task);

        taskList.appendChild(li);
      });
    }

    function startInlineEdit(li, task) {
      const titleSpan = li.querySelector(".title-text");
      const prioSpan = li.querySelector(".prio-tag");
      const bodyDiv = li.querySelector(".body-text");
      const editBtn = li.querySelector(".btn-edit");
      
      const titleInput = document.createElement("input");
      titleInput.className = "edit-input";
      titleInput.value = task.title;
      
      const prioSelect = document.createElement("select");
      prioSelect.className = "edit-prio";
      prioSelect.innerHTML = `
        <option value="1" ${task.priority == 1 ? 'selected' : ''}>Low</option>
        <option value="2" ${task.priority == 2 ? 'selected' : ''}>Med</option>
        <option value="3" ${task.priority == 3 ? 'selected' : ''}>High</option>
      `;

      const bodyInput = document.createElement("input");
      bodyInput.className = "edit-body";
      bodyInput.value = task.body || "";
      
      titleSpan.replaceWith(titleInput);
      prioSpan.replaceWith(prioSelect);
      bodyDiv.replaceWith(bodyInput);
      
      titleInput.focus();
      editBtn.innerHTML = "💾"; 

      const save = async () => {
        const newTitle = titleInput.value.trim();
        const newBody = bodyInput.value.trim();
        const newPrio = parseInt(prioSelect.value);
        
        if (newTitle && (newTitle !== task.title || newBody !== task.body || newPrio !== task.priority)) {
          await fetch(`${API}/${task._id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: newTitle, body: newBody, priority: newPrio })
          });
        }
        loadTasks();
      };

      editBtn.onclick = save;
    }

    async function loadTasks() {
      const res = await fetch(API);
      const data = await res.json();
      renderTasks(data.data);
    }

    addForm.addEventListener("submit", async e => {
      e.preventDefault();
      const title = document.getElementById("new-title").value;
      const body = document.getElementById("new-body").value;
      const priority = parseInt(document.getElementById("new-priority").value);

      await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, body, priority })
      });
      
      addForm.reset();
      loadTasks();
    });

    async function toggleTask(id, completed) {
      await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ completed })
      });
      loadTasks();
    }

    async function deleteTask(id) {
      if (confirm("Delete?")) {
        await fetch(`${API}/${id}`, { method: "DELETE" });
        loadTasks();
      }
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    loadTasks();
  </script>
</body>
</html>
