<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Missions</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>My Missions</h1>
 
        <form id="add-form">
            <div class="form-row">
                <input type="text" id="new-title" placeholder="Mission Name..." required autocomplete="off">
                <select id="new-priority">
                    <option value="1">🔵 Low</option>
                    <option value="2">🟡 Medium</option>
                    <option value="3">🔴 High</option>
                </select>
            </div>
            <input type="text" id="new-body" placeholder="Description (Optional)..." autocomplete="off">
            
            <div id="subtasks-input-area">
                <div id="temp-subtasks-list"></div>
                <div class="add-sub-row">
                    <input type="text" id="temp-sub-input" placeholder="Add a sub-task...">
                    <button type="button" id="btn-add-temp-sub">Add</button>
                </div>
            </div>
            <button type="submit" class="btn-main-add">Add Mission</button>
        </form>
 
        <ul id="task-list"></ul>
    </div>
 
    <script>
        // Base URL for all API requests to the Flask server
        const API = "/tasks";
 
        // Temporary array holding sub-tasks added before clicking "Add Mission"
        // Lives only in browser memory - not saved to MongoDB yet
        let tempSubtasks = [];
 
        // Stores the ID of the task currently in edit mode, or null if none
        let editingTaskId = null;
 
        // ------------------- Sub-task input in the main form -------------------
 
        // Listens for a click on the "Add" button next to the sub-task input
        document.getElementById("btn-add-temp-sub").onclick = () => {
            const input = document.getElementById("temp-sub-input");
            // trim() removes whitespace so the user can't add an empty sub-task
            if (input.value.trim()) {
                // Date.now() gives a unique number in milliseconds used as a temporary ID
                tempSubtasks.push({ 
                    id: Date.now().toString(), 
                    title: input.value.trim(), 
                    completed: false 
                });
                input.value = "";
                renderTempSubtasks();
            }
        };
 
        // Draws the temporary sub-task list on screen
        function renderTempSubtasks() {
            const list = document.getElementById("temp-subtasks-list");
            // map() builds HTML for each sub-task, join() combines them into one string
            // splice() removes a sub-task by its index in the array
            list.innerHTML = tempSubtasks.map((s, i) => `
                <div class="temp-sub-item">
                    <span>• ${s.title}</span>
                    <button type="button" onclick="tempSubtasks.splice(${i},1); renderTempSubtasks();">✕</button>
                </div>
            `).join("");
        }
 
        // ------------------- Loading and rendering tasks -------------------
 
        // Sends a GET request to the Flask server and fetches all tasks from MongoDB
        async function loadTasks() {
            const res = await fetch(API);
            const { data } = await res.json();
            renderTasks(data);
        }
 
        // Receives the task list and draws all the cards on screen
        function renderTasks(tasks) {
            const taskList = document.getElementById("task-list");
            
            // Remembers which tasks are open (sub-tasks visible) before clearing the list
            // So after a refresh they stay open instead of collapsing
            const openTaskIds = Array.from(document.querySelectorAll('details[open]'))
                .map(d => d.closest('.task-item').dataset.id);
            
            taskList.innerHTML = "";
            
            // Sort: incomplete tasks first, within those sort by highest priority
            tasks.sort((a, b) => (a.completed === b.completed ? b.priority - a.priority : a.completed ? 1 : -1));
 
            tasks.forEach((task, index) => {
                const li = document.createElement("li");
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                // Stores the task ID on the DOM element so we can reference it later
                li.dataset.id = task._id;
                
                // If this task is being edited - draw the edit form
                // Otherwise draw the normal card view
                if (editingTaskId === task._id) {
                    li.innerHTML = renderEditMode(task);
                } else {
                    li.innerHTML = renderNormalMode(task, index, openTaskIds.includes(task._id));
                }
                
                taskList.appendChild(li);
            });
        }
 
        // ------------------- Rendering a normal task card -------------------
 
        // Builds the HTML for a task card in normal view
        function renderNormalMode(task, index, isOpen) {
            // Checks if sub-tasks exist to decide whether to show the expand arrow
            const hasSubs = task.sub_tasks && task.sub_tasks.length > 0;
            const prioNames = { 1: 'LOW', 2: 'MED', 3: 'HIGH' };
 
            // Calculate progress bar values
            // Counts how many sub-tasks are completed out of the total
            const total = hasSubs ? task.sub_tasks.length : 0;
            const done = hasSubs ? task.sub_tasks.filter(s => s.completed).length : 0;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            
            return `
                <div class="task-main">
                    <div class="header-line">
                        <span class="task-num">#${index + 1}</span>
                        <input type="checkbox" class="toggle-cb" ${task.completed ? 'checked' : ''} 
                            onchange="updateTask('${task._id}', {completed: !${task.completed}})">
                        
                        ${hasSubs ? `
                            <details class="sub-details" ${isOpen ? 'open' : ''}>
                                <summary class="title-text">${task.title}</summary>
                                <ul class="subtask-list">
                                    ${task.sub_tasks.map((st, i) => `
                                        <li class="subtask-item">
                                            <input type="checkbox" ${st.completed ? 'checked' : ''}
                                                onchange="toggleSub('${task._id}', ${i})">
                                            <span class="${st.completed ? 'completed-text' : ''}">${st.title}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </details>
                        ` : `<span class="title-text no-subs">${task.title}</span>`}
                        
                        <span class="prio-tag prio-${task.priority}">${prioNames[task.priority]}</span>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="startEdit('${task._id}')">✎</button>
                        <button class="btn-delete" onclick="deleteTask('${task._id}')">✕</button>
                    </div>
                </div>
                <div class="task-body">${task.body || ""}</div>
                ${hasSubs ? `
                    <div class="task-progress-wrapper">
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" style="width: ${pct}%"></div>
                        </div>
                        <span class="progress-text">${done}/${total}</span>
                    </div>
                ` : ''}
            `;
        }
 
        // ------------------- Rendering the edit form -------------------
 
        // Builds the HTML for the edit form when the pencil icon is clicked
        function renderEditMode(task) {
            return `
                <div class="edit-mode-container">
                    <input type="text" id="edit-title-${task._id}" value="${task.title}" class="edit-input">
                    <textarea id="edit-body-${task._id}" class="edit-input">${task.body || ""}</textarea>
                    <select id="edit-prio-${task._id}" class="edit-input">
                        <option value="1" ${task.priority == 1 ? 'selected' : ''}>🔵 Low</option>
                        <option value="2" ${task.priority == 2 ? 'selected' : ''}>🟡 Medium</option>
                        <option value="3" ${task.priority == 3 ? 'selected' : ''}>🔴 High</option>
                    </select>
                    <div class="edit-subs-section">
                        <strong>Edit Sub-tasks:</strong>
                        <div id="edit-subs-list-${task._id}">
                            ${(task.sub_tasks || []).map((st, i) => `
                                <div class="edit-sub-item">
                                    <input type="text" value="${st.title}" onchange="updateSubText('${task._id}', ${i}, this.value)">
                                    <button type="button" onclick="removeSubFromEdit('${task._id}', ${i})">✕</button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="add-sub-row">
                            <input type="text" id="edit-new-sub-${task._id}" placeholder="New sub-task...">
                            <button type="button" class="btn-add-small" onclick="addSubToEdit('${task._id}')">Add</button>
                        </div>
                    </div>
                    <div class="edit-actions">
                        <button class="btn-save" onclick="saveEdit('${task._id}')">Save</button>
                        <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
                    </div>
                </div>
            `;
        }
 
        // ------------------- Edit control functions -------------------
 
        // Enter edit mode - saves the ID and refreshes the screen to show the edit form
        function startEdit(id) { editingTaskId = id; loadTasks(); }
 
        // Cancel edit - resets the ID and refreshes to go back to normal view
        function cancelEdit() { editingTaskId = null; loadTasks(); }
 
        // Save edit - pulls all values from the form fields and sends them to the server
        async function saveEdit(id) {
            const title = document.getElementById(`edit-title-${id}`).value;
            const body = document.getElementById(`edit-body-${id}`).value;
            const priority = document.getElementById(`edit-prio-${id}`).value;
            // First fetches the current task from the server to avoid losing existing sub-tasks
            const res = await fetch(`${API}/${id}`);
            const task = (await res.json()).data;
            await updateTask(id, { title, body, priority, sub_tasks: task.sub_tasks });
            editingTaskId = null;
        }
 
        // ------------------- Managing sub-tasks in edit mode -------------------
 
        // Adds a new sub-task while editing - saves directly to the server immediately
        async function addSubToEdit(taskId) {
            const input = document.getElementById(`edit-new-sub-${taskId}`);
            if (!input.value.trim()) return;
            // Fetches the current task, pushes the new sub-task into the array, sends it back
            const res = await fetch(`${API}/${taskId}`);
            const task = (await res.json()).data;
            task.sub_tasks.push({ id: Date.now().toString(), title: input.value.trim(), completed: false });
            await updateTask(taskId, { sub_tasks: task.sub_tasks });
        }
 
        // Removes a sub-task while editing by its index position in the array
        async function removeSubFromEdit(taskId, index) {
            const res = await fetch(`${API}/${taskId}`);
            const task = (await res.json()).data;
            task.sub_tasks.splice(index, 1);
            await updateTask(taskId, { sub_tasks: task.sub_tasks });
        }
 
        // Updates the text of an existing sub-task when the user changes it in the input field
        async function updateSubText(taskId, index, newText) {
            const res = await fetch(`${API}/${taskId}`);
            const task = (await res.json()).data;
            task.sub_tasks[index].title = newText;
            await updateTask(taskId, { sub_tasks: task.sub_tasks });
        }
 
        // ------------------- Server communication -------------------
 
        // Sends a PUT request to update task fields on the server, then refreshes the screen
        async function updateTask(id, data) {
            await fetch(`${API}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            loadTasks();
        }
 
        // Toggles a sub-task completed status - uses index position instead of ID
        // because some sub-tasks created via Postman don't have an id field
        async function toggleSub(taskId, index) {
            const res = await fetch(`${API}/${taskId}`);
            const task = (await res.json()).data;
            task.sub_tasks[index].completed = !task.sub_tasks[index].completed;
            await updateTask(taskId, { sub_tasks: task.sub_tasks });
        }
 
        // Deletes a task - asks the user for confirmation before sending DELETE to server
        async function deleteTask(id) {
            if (confirm("Are you sure?")) {
                await fetch(`${API}/${id}`, { method: "DELETE" });
                loadTasks();
            }
        }
 
        // ------------------- Main form submission -------------------
 
        // When the user clicks "Add Mission" - collects all form data and sends to server
        document.getElementById("add-form").onsubmit = async (e) => {
            // preventDefault stops the page from doing a full reload like a regular form
            e.preventDefault();
            const payload = {
                title: document.getElementById("new-title").value,
                body: document.getElementById("new-body").value,
                priority: document.getElementById("new-priority").value,
                // Sends the temporary sub-tasks that were collected in the tempSubtasks array
                sub_tasks: tempSubtasks
            };
            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            // Reset everything after submission
            tempSubtasks = [];
            e.target.reset();
            renderTempSubtasks();
            loadTasks();
        };
 
        // ------------------- Entry point -------------------
        // First line that runs when the page loads - fetches all tasks and displays them
        loadTasks();
    </script>
</body>
</html>
